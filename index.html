<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Pod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
}

/* HEADER */
header {
  background: black;
  padding: 20px;
  text-align: center;
}

.logo {
  font-size: 26px;
  font-weight: bold;
  background: linear-gradient(90deg,#2f80ed,#bb6bd9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  background: #fff;
  padding: 12px;
  border-bottom: 1px solid #ddd;
}

nav button {
  background: none;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* WRAPPER CENTRAL */
.wrapper {
  max-width: 1000px;
  margin: auto;
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* GRID DASH */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #fff;
  padding: 18px;
  border-radius: 12px;
}

/* TEXT */
.stat-title { font-size: 13px; color: #888; }
.stat-value { font-size: 20px; font-weight: bold; }
.green { color: #27ae60; }

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

/* FORM */
.form-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 10px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 12px;
  color: #666;
}

/* INPUT */
input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BUTTON */
button.main {
  background: black;
  color: white;
  padding: 12px;
  border-radius: 8px;
  border: none;
  width: 100%;
  margin-top: 10px;
}

.add-btn {
  background: #2f80ed;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 6px;
  margin: 10px 0;
  cursor: pointer;
}

/* LOGIN */
.login-box {
  max-width: 400px;
  margin: 100px auto;
}

.hidden { display: none; }
</style>
</head>

<body>

<header>
  <div class="logo">WAVEPOD</div>
</header>

<nav>
  <button onclick="trocarTela('dashboard')">Dashboard</button>
  <button onclick="trocarTela('vendas')">Vendas</button>
  <button onclick="trocarTela('compras')">Compras</button>
  <button onclick="trocarTela('estoque')">Estoque</button>
  <button onclick="trocarTela('historico')">Histórico</button>
</nav>

<div class="wrapper">

<!-- LOGIN -->
<div id="loginTela" class="login-box">
  <div class="card">
    <h2>Login</h2>
    <input id="userInput" placeholder="Usuário">
    <input id="passInput" type="password" placeholder="Senha">
    <button class="main" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">

<!-- DASHBOARD -->
<div id="dashboard" class="container">
  <div class="grid">
    <div class="card">
      <div class="stat-title">Investido</div>
      <div class="stat-value">R$ <span id="investido"></span></div>
    </div>

    <div class="card">
      <div class="stat-title">Receita</div>
      <div class="stat-value">R$ <span id="receita"></span></div>
    </div>

    <div class="card">
      <div class="stat-title">Lucro</div>
      <div class="stat-value green">R$ <span id="lucro"></span></div>
    </div>
  </div>
</div>

<!-- VENDAS -->
<div id="vendas" class="container hidden">
  <div class="card">
    <h3>Nova Venda</h3>

    <div class="form-group">
      <label>Produto</label>
      <select id="produto"></select>
    </div>

    <div class="form-group">
      <label>Quantidade</label>
      <input id="qtd" type="number">
    </div>

    <div class="form-group">
      <label>Preço (R$)</label>
      <input id="preco" type="number">
    </div>

    <button class="main" onclick="registrarVenda()">Registrar</button>
  </div>
</div>

<!-- COMPRAS -->
<div id="compras" class="container hidden">
  <div class="card">
    <h3>Nova Compra</h3>

    <div id="listaProdutos"></div>

    <button class="add-btn" onclick="adicionarProduto()">
      + Adicionar produto
    </button>

    <div class="form-group">
      <label>Frete total (R$)</label>
      <input id="freteCompra" type="number">
    </div>

    <button class="main" onclick="registrarCompra()">
      Registrar compra
    </button>
  </div>
</div>

<!-- ESTOQUE -->
<div id="estoque" class="container hidden">
  <div class="card">
    <h3>Estoque</h3>
    <table>
      <thead>
        <tr>
          <th>Produto</th>
          <th>Qtd</th>
          <th>Custo</th>
        </tr>
      </thead>
      <tbody id="tabelaEstoque"></tbody>
    </table>
  </div>
</div>

<!-- HISTÓRICO -->
<div id="historico" class="container hidden">
  <div class="card">
    <h3>Histórico</h3>
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Tipo</th>
          <th>Descrição</th>
          <th>Valor</th>
        </tr>
      </thead>
      <tbody id="tabelaHistorico"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://xxzvdwgcgcxycihswnyq.supabase.co",
  "sb_publishable_bbLucyRgJhQYBZrxvNrKSw_8rE6UPOc"
);

// LOGIN
function fazerLogin(){
  if(userInput.value==="Admin" && passInput.value==="Wave@2026"){
    localStorage.setItem("logado","true");
    iniciar();
  }
}

if(localStorage.getItem("logado")) iniciar();

function iniciar(){
  loginTela.style.display="none";
  app.classList.remove("hidden");
  carregarProdutos();
  dashboard();
  carregarHistorico();
}

// TROCAR TELA
function trocarTela(t){
  ["dashboard","vendas","compras","estoque","historico"]
  .forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(t).classList.remove("hidden");
}

// PRODUTOS
async function carregarProdutos(){
  const {data}=await supabaseClient.from("produtos").select("*");
  produto.innerHTML="";
  data.forEach(p=>{
    produto.innerHTML+=`<option value="${p.id}">${p.nome} (${p.quantidade})</option>`;
  });
}

// ADICIONAR PRODUTO
function adicionarProduto(){
  const div=document.createElement("div");
  div.classList.add("form-grid");

  div.innerHTML=`
    <div class="form-group">
      <label>Produto</label>
      <input class="nome">
    </div>
    <div class="form-group">
      <label>Qtd</label>
      <input type="number" class="qtd">
    </div>
    <div class="form-group">
      <label>Custo</label>
      <input type="number" class="custo">
    </div>
  `;

  listaProdutos.appendChild(div);
}
adicionarProduto();

// VENDA
async function registrarVenda(){
  const id=produto.value;
  const q=parseInt(qtd.value);
  const precoVenda=parseFloat(preco.value);

  const {data:prod}=await supabaseClient.from("produtos").select("*").eq("id",id).single();

  await supabaseClient.from("vendas").insert({
    produto_id:id,quantidade:q,preco_venda:precoVenda
  });

  await supabaseClient.from("produtos")
    .update({quantidade:prod.quantidade-q})
    .eq("id",id);

  await supabaseClient.from("historico").insert({
    tipo:"Venda",
    descricao:prod.nome+" ("+q+")",
    valor:precoVenda*q
  });

  dashboard();
  carregarHistorico();
}

// COMPRA
async function registrarCompra(){
  const itens=document.querySelectorAll("#listaProdutos .form-grid");
  const frete=parseFloat(freteCompra.value||0);

  for(let item of itens){
    const nome=item.querySelector(".nome").value;
    const qtd=parseInt(item.querySelector(".qtd").value);
    const custo=parseFloat(item.querySelector(".custo").value);

    await supabaseClient.from("compras").insert({
      nome,quantidade:qtd,custo,frete:0
    });

    await supabaseClient.from("produtos").insert({
      nome,quantidade:qtd,custo
    });

    await supabaseClient.from("historico").insert({
      tipo:"Compra",
      descricao:`${nome} (${qtd})`,
      valor:custo*qtd
    });
  }

  if(frete>0){
    await supabaseClient.from("historico").insert({
      tipo:"Frete",
      descricao:"Frete da compra",
      valor:frete
    });
  }

  alert("Compra registrada!");
  location.reload();
}

// DASHBOARD
async function dashboard(){
  const {data:compras}=await supabaseClient.from("compras").select("*");
  const {data:vendas}=await supabaseClient.from("vendas").select("*");
  const {data:produtos}=await supabaseClient.from("produtos").select("*");

  let totalC=0,totalV=0;

  compras.forEach(c=>totalC+=(c.custo*c.quantidade)+(c.frete||0));
  vendas.forEach(v=>totalV+=v.preco_venda*v.quantidade);

  investido.innerText=totalC.toFixed(2);
  receita.innerText=totalV.toFixed(2);
  lucro.innerText=(totalV-totalC).toFixed(2);

  tabelaEstoque.innerHTML="";
  produtos.forEach(p=>{
    tabelaEstoque.innerHTML+=`
      <tr>
        <td>${p.nome}</td>
        <td>${p.quantidade}</td>
        <td>R$ ${p.custo}</td>
      </tr>`;
  });
}

// HISTÓRICO
async function carregarHistorico(){
  const {data}=await supabaseClient
    .from("historico")
    .select("*")
    .order("data",{ascending:false});

  tabelaHistorico.innerHTML="";
  data.forEach(h=>{
    tabelaHistorico.innerHTML+=`
      <tr>
        <td>${new Date(h.data).toLocaleDateString()}</td>
        <td>${h.tipo}</td>
        <td>${h.descricao}</td>
        <td>R$ ${h.valor}</td>
      </tr>`;
  });
}
</script>

</body>
</html>
