<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Pod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
  text-align: center;
}

/* HEADER */
header {
  background: black;
  padding: 20px;
}

/* LOGO CENTRAL */
.logo {
  font-size: 26px;
  font-weight: bold;
  background: linear-gradient(90deg,#2f80ed,#bb6bd9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* NAV CENTRAL */
nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  background: #fff;
  padding: 12px;
  border-bottom: 1px solid #ddd;
}

nav button {
  background: none;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* CONTAINER */
.wrapper {
  max-width: 1100px;
  margin: auto;
}

.container {
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #fff;
  padding: 18px;
  border-radius: 12px;
  text-align: left;
}

/* TEXT */
.stat-title { font-size: 13px; color: #888; }
.stat-value { font-size: 20px; font-weight: bold; }
.green { color: #27ae60; }

/* TABLE */
table { width:100%; border-collapse: collapse; }
th, td { padding:10px; border-bottom:1px solid #eee; }

.status {
  background:#e6f9ed;
  color:#27ae60;
  padding:4px 10px;
  border-radius:10px;
}

/* INPUT */
input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

/* BUTTON */
button.main {
  background:black;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  width:100%;
}

/* LOGIN */
.login-box {
  max-width:400px;
  margin:100px auto;
}

.hidden { display:none; }
</style>
</head>

<body>

<header>
  <div class="logo">WAVEPOD</div>
</header>

<nav>
  <button onclick="trocarTela('dashboard')">Dashboard</button>
  <button onclick="trocarTela('vendas')">Vendas</button>
  <button onclick="trocarTela('compras')">Compras</button>
  <button onclick="trocarTela('estoque')">Estoque</button>
  <button onclick="trocarTela('historico')">Histórico</button>
</nav>

<div class="wrapper">

<!-- LOGIN -->
<div id="loginTela" class="login-box">
  <div class="card">
    <h2>Login</h2>
    <input id="userInput" placeholder="Usuário">
    <input id="passInput" type="password" placeholder="Senha">
    <button class="main" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">

<!-- DASHBOARD -->
<div id="dashboard" class="container">
  <div class="grid">
    <div class="card"><div class="stat-title">Investido</div><div class="stat-value">R$ <span id="investido"></span></div></div>
    <div class="card"><div class="stat-title">Receita</div><div class="stat-value">R$ <span id="receita"></span></div></div>
    <div class="card"><div class="stat-title">Lucro</div><div class="stat-value green">R$ <span id="lucro"></span></div></div>
  </div>
</div>

<!-- VENDAS -->
<div id="vendas" class="container hidden">
  <div class="card">
    <h3>Nova Venda</h3>
    <select id="produto"></select>
    <input id="qtd" type="number" placeholder="Quantidade">
    <input id="preco" type="number" placeholder="Preço">
    <button class="main" onclick="registrarVenda()">Registrar</button>
  </div>
</div>

<!-- COMPRAS -->
<div id="compras" class="container hidden">
  <div class="card">
    <h3>Nova Compra</h3>
    <input id="nomeCompra" placeholder="Produto">
    <input id="qtdCompra" type="number">
    <input id="custoCompra" type="number">
    <input id="freteCompra" type="number" placeholder="Frete">
    <button class="main" onclick="registrarCompra()">Registrar</button>
  </div>
</div>

<!-- ESTOQUE -->
<div id="estoque" class="container hidden">
  <div class="card">
    <h3>Estoque</h3>
    <table>
      <thead>
        <tr><th>Produto</th><th>Qtd</th><th>Custo</th></tr>
      </thead>
      <tbody id="tabelaEstoque"></tbody>
    </table>
  </div>
</div>

<!-- HISTÓRICO -->
<div id="historico" class="container hidden">
  <div class="card">
    <h3>Histórico</h3>
    <table>
      <thead>
        <tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Valor</th></tr>
      </thead>
      <tbody id="tabelaHistorico"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://xxzvdwgcgcxycihswnyq.supabase.co",
  "sb_publishable_bbLucyRgJhQYBZrxvNrKSw_8rE6UPOc"
);

// LOGIN
function fazerLogin(){
  if(userInput.value==="Admin" && passInput.value==="Wave@2026"){
    localStorage.setItem("logado","true");
    iniciar();
  }
}

if(localStorage.getItem("logado")) iniciar();

function iniciar(){
  loginTela.style.display="none";
  app.classList.remove("hidden");
  carregarProdutos();
  dashboard();
  carregarHistorico();
}

// TROCA
function trocarTela(t){
  ["dashboard","vendas","compras","estoque","historico"]
  .forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(t).classList.remove("hidden");
}

// PRODUTOS
async function carregarProdutos(){
  const {data}=await supabaseClient.from("produtos").select("*");
  produto.innerHTML="";
  data.forEach(p=>{
    produto.innerHTML+=`<option value="${p.id}">${p.nome} (${p.quantidade})</option>`;
  });
}

// VENDA
async function registrarVenda(){
  const id=produto.value;
  const q=parseInt(qtd.value);
  const precoVenda=parseFloat(preco.value);

  const {data:prod}=await supabaseClient.from("produtos").select("*").eq("id",id).single();

  await supabaseClient.from("vendas").insert({produto_id:id,quantidade:q,preco_venda:precoVenda});

  await supabaseClient.from("produtos")
    .update({quantidade:prod.quantidade-q})
    .eq("id",id);

  await supabaseClient.from("historico").insert({
    tipo:"Venda",
    descricao:prod.nome+" ("+q+")",
    valor:precoVenda*q
  });

  dashboard();
  carregarHistorico();
}

// COMPRA
async function registrarCompra(){
  const nome=nomeCompra.value;
  const q=parseInt(qtdCompra.value);
  const custo=parseFloat(custoCompra.value);
  const frete=parseFloat(freteCompra.value||0);

  await supabaseClient.from("compras").insert({nome,quantidade:q,custo,frete});

  await supabaseClient.from("produtos").insert({
    nome,quantidade:q,custo:custo+(frete/q)
  });

  await supabaseClient.from("historico").insert({
    tipo:"Compra",
    descricao:nome+" ("+q+")",
    valor:(custo*q)+frete
  });

  dashboard();
  carregarHistorico();
}

// DASH
async function dashboard(){
  const {data:compras}=await supabaseClient.from("compras").select("*");
  const {data:vendas}=await supabaseClient.from("vendas").select("*");
  const {data:produtos}=await supabaseClient.from("produtos").select("*");

  let totalC=0,totalV=0;

  compras.forEach(c=>totalC+=(c.custo*c.quantidade)+(c.frete||0));
  vendas.forEach(v=>totalV+=v.preco_venda*v.quantidade);

  investido.innerText=totalC.toFixed(2);
  receita.innerText=totalV.toFixed(2);
  lucro.innerText=(totalV-totalC).toFixed(2);

  tabelaEstoque.innerHTML="";
  produtos.forEach(p=>{
    tabelaEstoque.innerHTML+=`<tr><td>${p.nome}</td><td>${p.quantidade}</td><td>${p.custo}</td></tr>`;
  });
}

// HISTÓRICO
async function carregarHistorico(){
  const {data}=await supabaseClient.from("historico").select("*").order("data",{ascending:false});

  tabelaHistorico.innerHTML="";
  data.forEach(h=>{
    tabelaHistorico.innerHTML+=`
      <tr>
        <td>${new Date(h.data).toLocaleDateString()}</td>
        <td>${h.tipo}</td>
        <td>${h.descricao}</td>
        <td>R$ ${h.valor}</td>
      </tr>`;
  });
}
</script>

</body>
</html>
