<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WavePod - Interno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --blue: #00d4ff; --pink: #d946ef; --text: #ffffff; --sub: #8b949e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        .wp-logo { font-size: 28px; font-weight: 800; text-align: center; padding: 25px 0; background: linear-gradient(90deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 20px; }
        .nav-btn { background: var(--card); border: 1px solid var(--border); color: var(--sub); padding: 10px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; border: none; }
        .nav-btn.active { background: var(--blue); color: #000; font-weight: 600; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        input, select { background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .btn-main { background: linear-gradient(90deg, var(--blue), var(--pink)); border: none; padding: 15px; border-radius: 12px; color: white; font-weight: 800; width: 100%; cursor: pointer; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 8px; margin-bottom: 10px; align-items: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuração do Supabase
        const client = supabase.createClient('https://xxzvdwgcgcxycihswnyq.supabase.co', 'sb_publishable_bbLucyRgJhQYBZrxvNrKSw_8rE6UPOc');

        function App() {
            const [isLogged, setIsLogged] = useState(false);
            const [tab, setTab] = useState('dashboard');
            const [userInput, setUserInput] = useState('');
            const [passInput, setPassInput] = useState('');
            const [stock, setStock] = useState([]);
            const [compraItems, setCompraItems] = useState([{ id: 1, name: '', cost: '', qty: '' }]);

            const tryLogin = () => {
                console.log("Tentativa de login com:", userInput);
                if (userInput === 'admin' && passInput === 'Wave@Lucas10Diego') {
                    setIsLogged(true);
                } else {
                    alert('Usuário ou Senha incorretos.');
                }
            };

            useEffect(() => {
                if (isLogged) {
                    const fetchStock = async () => {
                        const { data } = await client.from('estoque').select('*');
                        if (data) setStock(data);
                    };
                    fetchStock();
                }
            }, [isLogged]);

            // TELA DE LOGIN
            if (!isLogged) {
                return (
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '90vh' }}>
                        <div className="card" style={{ width: '100%', maxWidth: '320px', textAlign: 'center' }}>
                            <div className="wp-logo">WAVEPOD</div>
                            <input 
                                type="text" 
                                placeholder="Usuário" 
                                value={userInput} 
                                onChange={(e) => setUserInput(e.target.value)} 
                            />
                            <input 
                                type="password" 
                                placeholder="Senha" 
                                value={passInput} 
                                onChange={(e) => setPassInput(e.target.value)} 
                            />
                            <button className="btn-main" onClick={tryLogin}>ENTRAR NO SISTEMA</button>
                        </div>
                    </div>
                );
            }

            // TELA PRINCIPAL (DASHBOARD)
            return (
                <div style={{ maxWidth: '500px', margin: '0 auto' }}>
                    <div className="wp-logo">WAVEPOD</div>
                    
                    <div className="nav">
                        <button className={`nav-btn ${tab === 'dashboard' ? 'active' : ''}`} onClick={() => setTab('dashboard')}>Dashboard</button>
                        <button className={`nav-btn ${tab === 'compra' ? 'active' : ''}`} onClick={() => setTab('compra')}>Compra</button>
                        <button className={`nav-btn ${tab === 'venda' ? 'active' : ''}`} onClick={() => setTab('venda')}>Venda</button>
                        <button className={`nav-btn ${tab === 'estoque' ? 'active' : ''}`} onClick={() => setTab('estoque')}>Estoque</button>
                    </div>

                    {tab === 'dashboard' && (
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                            <div className="card"><small style={{color:'var(--sub)'}}>INVESTIDO</small><h3>R$ 570,00</h3></div>
                            <div className="card"><small style={{color:'var(--sub)'}}>LUCRO</small><h3 style={{color:'var(--blue)'}}>R$ 0,00</h3></div>
                        </div>
                    )}

                    {tab === 'compra' && (
                        <div className="card">
                            <h3 style={{marginTop:0}}>Nova Compra</h3>
                            {compraItems.map((item, index) => (
                                <div key={item.id} className="item-row">
                                    <input placeholder="Produto" value={item.name} onChange={(e) => {
                                        const newItems = [...compraItems];
                                        newItems[index].name = e.target.value;
                                        setCompraItems(newItems);
                                    }} />
                                    <input type="number" placeholder="Custo" />
                                    <input type="number" placeholder="Qtd" />
                                    <button onClick={() => setCompraItems(compraItems.filter(i => i.id !== item.id))} style={{background:'none', border:'none', color:'red'}}>✕</button>
                                </div>
                            ))}
                            <button 
                                onClick={() => setCompraItems([...compraItems, { id: Date.now(), name: '', cost: '', qty: '' }])}
                                style={{ background: 'none', border: '1px dashed var(--sub)', color: 'var(--sub)', width: '100%', padding: 10, borderRadius: 8, marginBottom: 15, cursor: 'pointer' }}
                            >
                                + Adicionar mais de 1 produto
                            </button>
                            <button className="btn-main">Salvar no Supabase</button>
                        </div>
                    )}

                    {tab === 'venda' && (
                        <div className="card">
                            <h3 style={{marginTop:0}}>Registrar Venda</h3>
                            <select>
                                <option>Selecionar produto...</option>
                                {stock.map(s => <option key={s.id}>{s.produto} ({s.quantidade} un)</option>)}
                            </select>
                            <input type="number" placeholder="Quantidade" />
                            <input type="number" placeholder="Preço de Venda" />
                            <button className="btn-main">Confirmar Venda</button>
                        </div>
                    )}

                    {tab === 'estoque' && (
                        <div className="card">
                            <h3 style={{marginTop:0}}>Estoque</h3>
                            <table style={{width: '100%', textAlign: 'left', fontSize: '14px'}}>
                                <thead><tr style={{color: 'var(--sub)'}}><th>Produto</th><th>Qtd</th><th>Custo</th></tr></thead>
                                <tbody>
                                    {stock.length > 0 ? stock.map(s => (
                                        <tr key={s.id}><td>{s.produto}</td><td>{s.quantidade}</td><td>R$ {s.custo_medio}</td></tr>
                                    )) : <tr><td colSpan="3" style={{textAlign:'center', padding: '20px', color: 'var(--sub)'}}>Buscando dados no Supabase...</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
