<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Pod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.logo {
  color: #007bff;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

button {
  background: black;
  color: white;
  padding: 10px;
  border: none;
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <div class="logo">Wave Pod</div>
  <button onclick="logout()">Sair</button>
</header>

<div id="telaLogin" class="container">
  <div class="card">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="container hidden">

  <!-- DASHBOARD -->
  <div class="card">
    <h3>Dashboard</h3>
    <p>Total investido: R$ <span id="investido">0</span></p>
    <p>Lucro: R$ <span id="lucro">0</span></p>
  </div>

  <!-- VENDAS -->
  <div class="card">
    <h3>Nova Venda</h3>

    <select id="produto"></select>
    <input type="number" id="qtd" placeholder="Quantidade">
    <input type="number" id="preco" placeholder="Preço venda">

    <button onclick="registrarVenda()">Registrar venda</button>
  </div>

  <!-- COMPRAS -->
  <div class="card">
    <h3>Nova Compra</h3>

    <input id="nomeCompra" placeholder="Produto">
    <input type="number" id="qtdCompra" placeholder="Quantidade">
    <input type="number" id="custoCompra" placeholder="Custo">

    <button onclick="registrarCompra()">Registrar compra</button>
  </div>

  <!-- EXPORT -->
  <div class="card">
    <button onclick="exportar()">Exportar Excel</button>
  </div>

</div>

<script>
const supabase = supabase.createClient(
  "https://xxzvdwgcgcxycihswnyq.supabase.co",
  "sb_publishable_bbLucyRgJhQYBZrxvNrKSw_8rE6UPOc"
);

// LOGIN
function login() {
  const u = user.value;
  const p = pass.value;

  if (u === "Admin" && p === "Wave@2026") {
    localStorage.setItem("logado", "true");
    iniciar();
  } else {
    alert("Login inválido");
  }
}

function logout() {
  localStorage.removeItem("logado");
  location.reload();
}

function iniciar() {
  document.getElementById("telaLogin").style.display = "none";
  app.classList.remove("hidden");
  carregarProdutos();
  dashboard();
}

// AUTO LOGIN
if (localStorage.getItem("logado")) iniciar();

// CARREGAR PRODUTOS
async function carregarProdutos() {
  const { data } = await supabase.from("produtos").select("*");

  produto.innerHTML = "";

  data.forEach(p => {
    produto.innerHTML += `<option value="${p.id}">${p.nome} (${p.quantidade})</option>`;
  });
}

// VENDA
async function registrarVenda() {
  const prodId = produto.value;
  const q = parseInt(qtd.value);
  const precoVenda = parseFloat(preco.value);

  const { data: prod } = await supabase
    .from("produtos")
    .select("*")
    .eq("id", prodId)
    .single();

  await supabase.from("vendas").insert({
    produto_id: prodId,
    quantidade: q,
    preco_venda: precoVenda
  });

  await supabase.from("produtos")
    .update({ quantidade: prod.quantidade - q })
    .eq("id", prodId);

  alert("Venda registrada");
  carregarProdutos();
  dashboard();
}

// COMPRA
async function registrarCompra() {
  const nome = nomeCompra.value;
  const q = parseInt(qtdCompra.value);
  const custo = parseFloat(custoCompra.value);

  await supabase.from("compras").insert({
    nome, quantidade: q, custo
  });

  await supabase.from("produtos").insert({
    nome, quantidade: q, custo
  });

  alert("Compra registrada");
  carregarProdutos();
  dashboard();
}

// DASHBOARD
async function dashboard() {
  const { data: compras } = await supabase.from("compras").select("*");
  const { data: vendas } = await supabase.from("vendas").select("*");

  let totalCompras = 0;
  let totalVendas = 0;

  compras.forEach(c => totalCompras += c.custo * c.quantidade);
  vendas.forEach(v => totalVendas += v.preco_venda * v.quantidade);

  investido.innerText = totalCompras.toFixed(2);
  lucro.innerText = (totalVendas - totalCompras).toFixed(2);
}

// EXPORTAR
async function exportar() {
  const { data } = await supabase.from("vendas").select("*");

  let csv = "Quantidade,Preço\n";

  data.forEach(v => {
    csv += `${v.quantidade},${v.preco_venda}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "relatorio.csv";
  a.click();
}
</script>

</body>
</html>
