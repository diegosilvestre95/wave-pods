<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Pod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
}

/* HEADER */
header {
  background: #000;
  color: #fff;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
}

/* LOGO */
.logo {
  color: #2f80ed;
  font-weight: bold;
}

/* NAV */
nav {
  background: #fff;
  padding: 12px 25px;
  display: flex;
  gap: 20px;
  border-bottom: 1px solid #ddd;
}

/* BOTÕES NAV */
nav button {
  background: none;
  border: none;
  cursor: pointer;
  font-weight: 500;
}

/* CONTAINER CENTRAL */
.wrapper {
  max-width: 1000px;
  margin: auto;
}

/* CONTEÚDO */
.container {
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
}

/* CARDS */
.card {
  background: #fff;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* TEXTO */
.stat-title {
  font-size: 13px;
  color: #888;
}

.stat-value {
  font-size: 20px;
  font-weight: bold;
}

.green { color: #27ae60; }

/* TABELA */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.status {
  background: #e6f9ed;
  color: #27ae60;
  padding: 4px 10px;
  border-radius: 10px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BOTÃO */
button.main {
  background: #000;
  color: #fff;
  padding: 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* LOGIN */
.login-box {
  max-width: 400px;
  margin: 100px auto;
}

/* ESCONDER */
.hidden { display: none; }
</style>
</head>

<body>

<header>
  <div class="logo">Wave Pod</div>
  <button onclick="logout()">Sair</button>
</header>

<nav>
  <button onclick="trocarTela('dashboard')">Dashboard</button>
  <button onclick="trocarTela('vendas')">Vendas</button>
  <button onclick="trocarTela('compras')">Compras</button>
</nav>

<div class="wrapper">

<!-- LOGIN -->
<div id="loginTela" class="login-box">
  <div class="card">
    <h2>Login</h2>
    <input id="userInput" placeholder="Usuário">
    <input id="passInput" type="password" placeholder="Senha">
    <button class="main" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- DASHBOARD -->
<div id="dashboard" class="container">

  <h2>Dashboard</h2>
  <p style="color:#888">Visão geral</p>

  <div class="grid">
    <div class="card">
      <div class="stat-title">Total investido</div>
      <div class="stat-value">R$ <span id="investido">0</span></div>
    </div>

    <div class="card">
      <div class="stat-title">Receita total</div>
      <div class="stat-value">R$ <span id="receita">0</span></div>
    </div>

    <div class="card">
      <div class="stat-title">Lucro líquido</div>
      <div class="stat-value green">R$ <span id="lucro">0</span></div>
    </div>

    <div class="card">
      <div class="stat-title">Lucro por sócio</div>
      <div class="stat-value green">R$ <span id="lucroSocio">0</span></div>
    </div>
  </div>

  <div class="card">
    <h3>Estoque resumido</h3>
    <table>
      <thead>
        <tr>
          <th>Produto</th>
          <th>QTD</th>
          <th>Custo</th>
          <th>Valor</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tabelaEstoque"></tbody>
    </table>
  </div>

</div>

<!-- VENDAS -->
<div id="vendas" class="container hidden">
  <div class="card">
    <h3>Nova Venda</h3>
    <select id="produto"></select>
    <input id="qtd" type="number" placeholder="Quantidade">
    <input id="preco" type="number" placeholder="Preço venda">
    <button class="main" onclick="registrarVenda()">Registrar venda</button>
  </div>
</div>

<!-- COMPRAS -->
<div id="compras" class="container hidden">
  <div class="card">
    <h3>Nova Compra</h3>
    <input id="nomeCompra" placeholder="Produto">
    <input id="qtdCompra" type="number" placeholder="Quantidade">
    <input id="custoCompra" type="number" placeholder="Custo">
    <input id="freteCompra" type="number" placeholder="Frete">
    <button class="main" onclick="registrarCompra()">Registrar compra</button>
  </div>
</div>

</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://xxzvdwgcgcxycihswnyq.supabase.co",
  "sb_publishable_bbLucyRgJhQYBZrxvNrKSw_8rE6UPOc"
);

// LOGIN
function fazerLogin() {
  const u = document.getElementById("userInput").value;
  const p = document.getElementById("passInput").value;

  if (u === "Admin" && p === "Wave@2026") {
    localStorage.setItem("logado", "true");
    iniciarSistema();
  } else {
    alert("Login inválido");
  }
}

function logout() {
  localStorage.removeItem("logado");
  location.reload();
}

function iniciarSistema() {
  document.getElementById("loginTela").style.display = "none";
  document.getElementById("app").classList.remove("hidden");
  carregarProdutos();
  atualizarDashboard();
}

// AUTO LOGIN
if (localStorage.getItem("logado")) iniciarSistema();

// TROCAR TELA
function trocarTela(tela) {
  ["dashboard","vendas","compras"].forEach(t =>
    document.getElementById(t).classList.add("hidden")
  );
  document.getElementById(tela).classList.remove("hidden");
}

// PRODUTOS
async function carregarProdutos() {
  const { data } = await supabaseClient.from("produtos").select("*");
  const select = document.getElementById("produto");
  select.innerHTML = "";

  data.forEach(p => {
    select.innerHTML += `<option value="${p.id}">
      ${p.nome} (${p.quantidade})
    </option>`;
  });
}

// VENDA
async function registrarVenda() {
  const id = produto.value;
  const q = parseInt(qtd.value);
  const precoVenda = parseFloat(preco.value);

  const { data: prod } = await supabaseClient
    .from("produtos").select("*").eq("id", id).single();

  await supabaseClient.from("vendas").insert({
    produto_id: id,
    quantidade: q,
    preco_venda: precoVenda
  });

  await supabaseClient
    .from("produtos")
    .update({ quantidade: prod.quantidade - q })
    .eq("id", id);

  alert("Venda registrada");
  atualizarDashboard();
}

// COMPRA
async function registrarCompra() {
  const nome = nomeCompra.value;
  const q = parseInt(qtdCompra.value);
  const custo = parseFloat(custoCompra.value);
  const frete = parseFloat(freteCompra.value || 0);

  await supabaseClient.from("compras").insert({
    nome, quantidade: q, custo, frete
  });

  await supabaseClient.from("produtos").insert({
    nome, quantidade: q, custo: custo + (frete/q)
  });

  alert("Compra registrada");
  atualizarDashboard();
}

// DASHBOARD
async function atualizarDashboard() {
  const { data: compras } = await supabaseClient.from("compras").select("*");
  const { data: vendas } = await supabaseClient.from("vendas").select("*");
  const { data: produtos } = await supabaseClient.from("produtos").select("*");

  let totalCompras = 0;
  let totalVendas = 0;

  compras.forEach(c => totalCompras += (c.custo * c.quantidade) + (c.frete || 0));
  vendas.forEach(v => totalVendas += v.preco_venda * v.quantidade);

  const lucro = totalVendas - totalCompras;

  document.getElementById("investido").innerText = totalCompras.toFixed(2);
  document.getElementById("receita").innerText = totalVendas.toFixed(2);
  document.getElementById("lucro").innerText = lucro.toFixed(2);
  document.getElementById("lucroSocio").innerText = (lucro/2).toFixed(2);

  const tabela = document.getElementById("tabelaEstoque");
  tabela.innerHTML = "";

  produtos.forEach(p => {
    const valor = p.quantidade * p.custo;

    tabela.innerHTML += `
      <tr>
        <td>${p.nome}</td>
        <td>${p.quantidade}</td>
        <td>R$ ${p.custo}</td>
        <td>R$ ${valor.toFixed(2)}</td>
        <td><span class="status">OK</span></td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
