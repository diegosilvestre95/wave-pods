<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Pod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
}

/* HEADER */
header {
  background: #000;
  color: white;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
}

.logo {
  color: #2f80ed;
  font-weight: bold;
  font-size: 18px;
}

/* NAV */
nav {
  background: #fff;
  padding: 12px 25px;
  display: flex;
  gap: 25px;
  border-bottom: 1px solid #ddd;
}

nav button {
  background: none;
  border: none;
  font-weight: 500;
  cursor: pointer;
  color: #555;
}

nav button:hover {
  color: #000;
}

/* CONTAINER */
.container {
  padding: 25px;
}

/* DASH GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

/* CARDS */
.card {
  background: #fff;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* STATS */
.stat-title {
  font-size: 13px;
  color: #888;
}

.stat-value {
  font-size: 22px;
  font-weight: bold;
}

.green {
  color: #27ae60;
}

/* TABELA */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  text-align: left;
  border-bottom: 1px solid #eee;
}

.status {
  background: #e6f9ed;
  color: #27ae60;
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 12px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BUTTON */
button.main {
  background: black;
  color: white;
  padding: 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.hidden { display: none; }
</style>
</head>

<body>

<header>
  <div class="logo">Wave Pod</div>
  <button onclick="logout()">Sair</button>
</header>

<nav>
  <button onclick="trocarTela('dashboard')">Dashboard</button>
  <button onclick="trocarTela('vendas')">Vendas</button>
  <button onclick="trocarTela('compras')">Compras</button>
</nav>

<!-- LOGIN -->
<div id="loginTela" class="container">
  <div class="card">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button class="main" onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div id="dashboard" class="container">

  <h2>Dashboard</h2>
  <p style="color:#888">Visão geral</p>

  <div class="grid">
    <div class="card">
      <div class="stat-title">Total investido</div>
      <div class="stat-value">R$ <span id="investido">0</span></div>
    </div>

    <div class="card">
      <div class="stat-title">Receita total</div>
      <div class="stat-value">R$ <span id="receita">0</span></div>
    </div>

    <div class="card">
      <div class="stat-title">Lucro líquido</div>
      <div class="stat-value green">R$ <span id="lucro">0</span></div>
    </div>

    <div class="card">
      <div class="stat-title">Lucro por sócio</div>
      <div class="stat-value green">R$ <span id="lucroSocio">0</span></div>
    </div>
  </div>

  <!-- ESTOQUE -->
  <div class="card">
    <h3>Estoque resumido</h3>
    <table>
      <thead>
        <tr>
          <th>Produto</th>
          <th>QTD</th>
          <th>Custo médio</th>
          <th>Valor em estoque</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tabelaEstoque"></tbody>
    </table>
  </div>

</div>
</div>

<div id="vendas" class="container hidden">
  <div class="card">
    <h3>Nova Venda</h3>

    <select id="produto"></select>
    <input type="number" id="qtd" placeholder="Quantidade">
    <input type="number" id="preco" placeholder="Preço venda">

    <button class="main" onclick="registrarVenda()">Registrar venda</button>
  </div>
</div>

<div id="compras" class="container hidden">
  <div class="card">
    <h3>Nova Compra</h3>

    <input id="nomeCompra" placeholder="Produto">
    <input type="number" id="qtdCompra" placeholder="Quantidade">
    <input type="number" id="custoCompra" placeholder="Custo produto">
    <input type="number" id="freteCompra" placeholder="Frete">

    <button class="main" onclick="registrarCompra()">Registrar compra</button>
  </div>
</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://xxzvdwgcgcxycihswnyq.supabase.co",
  "sb_publishable_bbLucyRgJhQYBZrxvNrKSw_8rE6UPOc"
);

// LOGIN
function login() {
  if (user.value === "Admin" && pass.value === "Wave@2026") {
    localStorage.setItem("logado", "true");
    iniciar();
  }
}

function logout() {
  localStorage.removeItem("logado");
  location.reload();
}

function iniciar() {
  loginTela.style.display = "none";
  app.classList.remove("hidden");
  carregarProdutos();
  dashboard();
}

if (localStorage.getItem("logado")) iniciar();

// TROCAR TELA
function trocarTela(tela) {
  ["dashboard","vendas","compras"].forEach(id => {
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(tela).classList.remove("hidden");
}

// PRODUTOS
async function carregarProdutos() {
  const { data } = await supabaseClient.from("produtos").select("*");
  produto.innerHTML = "";
  data.forEach(p => {
    produto.innerHTML += `<option value="${p.id}">
      ${p.nome} (${p.quantidade})
    </option>`;
  });
}

// VENDA
async function registrarVenda() {
  const prodId = produto.value;
  const q = parseInt(qtd.value);
  const precoVenda = parseFloat(preco.value);

  const { data: prod } = await supabaseClient
    .from("produtos")
    .select("*")
    .eq("id", prodId)
    .single();

  await supabaseClient.from("vendas").insert({
    produto_id: prodId,
    quantidade: q,
    preco_venda: precoVenda
  });

  await supabaseClient
    .from("produtos")
    .update({ quantidade: prod.quantidade - q })
    .eq("id", prodId);

  alert("Venda registrada");
  dashboard();
}

// COMPRA COM FRETE
async function registrarCompra() {
  const nome = nomeCompra.value;
  const q = parseInt(qtdCompra.value);
  const custo = parseFloat(custoCompra.value);
  const frete = parseFloat(freteCompra.value || 0);

  await supabaseClient.from("compras").insert({
    nome, quantidade: q, custo, frete
  });

  await supabaseClient.from("produtos").insert({
    nome, quantidade: q, custo: custo + (frete/q)
  });

  alert("Compra registrada");
  dashboard();
}

// DASHBOARD
async function dashboard() {
  const { data: compras } = await supabaseClient.from("compras").select("*");
  const { data: vendas } = await supabaseClient.from("vendas").select("*");
  const { data: produtos } = await supabaseClient.from("produtos").select("*");

  let totalCompras = 0;
  let totalVendas = 0;

  compras.forEach(c => totalCompras += (c.custo * c.quantidade) + (c.frete || 0));
  vendas.forEach(v => totalVendas += v.preco_venda * v.quantidade);

  const lucro = totalVendas - totalCompras;

  investido.innerText = totalCompras.toFixed(2);
  receita.innerText = totalVendas.toFixed(2);
  lucro.innerText = lucro.toFixed(2);
  lucroSocio.innerText = (lucro / 2).toFixed(2);

  // TABELA ESTOQUE
  const tabela = document.getElementById("tabelaEstoque");
  tabela.innerHTML = "";

  produtos.forEach(p => {
    const valor = p.quantidade * p.custo;

    tabela.innerHTML += `
      <tr>
        <td>${p.nome}</td>
        <td>${p.quantidade}</td>
        <td>R$ ${p.custo}</td>
        <td>R$ ${valor.toFixed(2)}</td>
        <td><span class="status">OK</span></td>
      </tr>
    `;
  });
}
}
</script>

</body>
</html>
