<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Pod</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.logo {
  color: #007bff;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

button {
  background: black;
  color: white;
  padding: 10px;
  border: none;
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <div class="logo">Wave Pod</div>
  <button onclick="logout()">Sair</button>
</header>

<!-- LOGIN -->
<div id="telaLogin" class="container">
  <div class="card">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="container hidden">

  <!-- DASHBOARD -->
  <div class="card">
    <h3>Dashboard</h3>
    <p>Total investido: R$ <span id="investido">0</span></p>
    <p>Lucro: R$ <span id="lucro">0</span></p>
  </div>

  <!-- VENDAS -->
  <div class="card">
    <h3>Nova Venda</h3>

    <select id="produto"></select>
    <input type="number" id="qtd" placeholder="Quantidade">
    <input type="number" id="preco" placeholder="Preço venda">

    <button onclick="registrarVenda()">Registrar venda</button>
  </div>

  <!-- COMPRAS -->
  <div class="card">
    <h3>Nova Compra</h3>

    <input id="nomeCompra" placeholder="Produto">
    <input type="number" id="qtdCompra" placeholder="Quantidade">
    <input type="number" id="custoCompra" placeholder="Custo">

    <button onclick="registrarCompra()">Registrar compra</button>
  </div>

  <!-- EXPORT -->
  <div class="card">
    <button onclick="exportar()">Exportar Excel</button>
  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://xxzvdwgcgcxycihswnyq.supabase.co",
  "sb_publishable_bbLucyRgJhQYBZrxvNrKSw_8rE6UPOc"
);

// LOGIN
function fazerLogin() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === "Admin" && p === "Wave@2026") {
    localStorage.setItem("logado", "true");
    iniciarSistema();
  } else {
    alert("Login inválido");
  }
}

function logout() {
  localStorage.removeItem("logado");
  location.reload();
}

function iniciarSistema() {
  document.getElementById("telaLogin").style.display = "none";
  document.getElementById("app").classList.remove("hidden");

  carregarProdutos();
  atualizarDashboard();
}

// AUTO LOGIN
if (localStorage.getItem("logado")) {
  iniciarSistema();
}

// CARREGAR PRODUTOS
async function carregarProdutos() {
  const { data, error } = await supabaseClient
    .from("produtos")
    .select("*");

  if (error) {
    console.error(error);
    return;
  }

  const select = document.getElementById("produto");
  select.innerHTML = "";

  data.forEach(p => {
    select.innerHTML += `<option value="${p.id}">
      ${p.nome} (Estoque: ${p.quantidade})
    </option>`;
  });
}

// REGISTRAR VENDA
async function registrarVenda() {
  const prodId = document.getElementById("produto").value;
  const q = parseInt(document.getElementById("qtd").value);
  const precoVenda = parseFloat(document.getElementById("preco").value);

  const { data: prod } = await supabaseClient
    .from("produtos")
    .select("*")
    .eq("id", prodId)
    .single();

  if (!prod || q > prod.quantidade) {
    alert("Estoque insuficiente");
    return;
  }

  await supabaseClient.from("vendas").insert({
    produto_id: prodId,
    quantidade: q,
    preco_venda: precoVenda
  });

  await supabaseClient
    .from("produtos")
    .update({ quantidade: prod.quantidade - q })
    .eq("id", prodId);

  alert("Venda registrada!");
  carregarProdutos();
  atualizarDashboard();
}

// REGISTRAR COMPRA
async function registrarCompra() {
  const nome = document.getElementById("nomeCompra").value;
  const q = parseInt(document.getElementById("qtdCompra").value);
  const custo = parseFloat(document.getElementById("custoCompra").value);

  await supabaseClient.from("compras").insert({
    nome, quantidade: q, custo
  });

  await supabaseClient.from("produtos").insert({
    nome, quantidade: q, custo
  });

  alert("Compra registrada!");
  carregarProdutos();
  atualizarDashboard();
}

// DASHBOARD
async function atualizarDashboard() {
  const { data: compras } = await supabaseClient.from("compras").select("*");
  const { data: vendas } = await supabaseClient.from("vendas").select("*");

  let totalCompras = 0;
  let totalVendas = 0;

  compras?.forEach(c => totalCompras += c.custo * c.quantidade);
  vendas?.forEach(v => totalVendas += v.preco_venda * v.quantidade);

  document.getElementById("investido").innerText = totalCompras.toFixed(2);
  document.getElementById("lucro").innerText = (totalVendas - totalCompras).toFixed(2);
}

// EXPORTAR CSV
async function exportar() {
  const { data } = await supabaseClient.from("vendas").select("*");

  let csv = "Quantidade,Preço\n";

  data.forEach(v => {
    csv += `${v.quantidade},${v.preco_venda}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "relatorio.csv";
  a.click();
}
</script>

</body>
</html>
