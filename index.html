<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WavePod ERP</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --blue: #00d4ff; --pink: #d946ef; --text: #ffffff; --sub: #8b949e; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'SF Pro Display', sans-serif; margin: 0; padding: env(safe-area-inset-top) 15px 100px; }
        .wp-logo { font-size: 24px; font-weight: 800; text-align: center; padding: 25px 0; background: linear-gradient(90deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 25px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .main-balance { background: linear-gradient(145deg, #1e252e, #161b22); border: 1px solid var(--border); border-radius: 28px; padding: 30px; text-align: center; margin-bottom: 20px; }
        .val-hero { font-size: 38px; font-weight: 800; margin: 10px 0; color: var(--blue); }
        input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 16px; border-radius: 16px; width: 100%; margin: 8px 0 16px; font-size: 16px; }
        .btn-action { background: linear-gradient(90deg, var(--blue), var(--pink)); border: none; padding: 18px; border-radius: 18px; color: white; font-weight: 800; width: 100%; font-size: 16px; cursor: pointer; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 10px env(safe-area-inset-bottom); z-index: 100; }
        .tab-item { background: none; border: none; color: var(--sub); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .tab-item.active { color: var(--blue); }
        .label-sub { color: var(--sub); font-size: 11px; text-transform: uppercase; font-weight: 700; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; color:#8b949e;">
            Carregando WavePod...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inicialização do Supabase
        const sbUrl = 'https://xxzvdwgcgcxycihswnyq.supabase.co';
        const sbKey = 'sb_publishable_bbLucyRgJhQYBZrxvNrKSw_8rE6UPOc';
        const supabase = window.supabase.createClient(sbUrl, sbKey);

        function App() {
            const [isLogged, setIsLogged] = useState(false);
            const [tab, setTab] = useState('home');
            const [user, setUser] = useState('');
            const [pass, setPass] = useState('');

            // Verifica se já estava logado antes
            useEffect(() => {
                const session = localStorage.getItem('wave_session');
                if (session === 'active') setIsLogged(true);
            }, []);

            const handleLogin = () => {
                // Usuário e senha conforme solicitado
                if (user.toLowerCase() === 'admin' && pass === 'Wave@2026') {
                    localStorage.setItem('wave_session', 'active');
                    setIsLogged(true);
                } else {
                    alert('Credenciais incorretas!');
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('wave_session');
                setIsLogged(false);
            };

            if (!isLogged) {
                return (
                    <div style={{ padding: '60px 20px', textAlign: 'center' }}>
                        <div className="wp-logo">WAVEPOD</div>
                        <div className="card">
                            <h3 style={{ marginBottom: 20 }}>Acesso Restrito</h3>
                            <input 
                                placeholder="Usuário" 
                                value={user}
                                onChange={(e) => setUser(e.target.value)}
                                autoCapitalize="none"
                            />
                            <input 
                                type="password" 
                                placeholder="Senha" 
                                value={pass}
                                onChange={(e) => setPass(e.target.value)}
                            />
                            <button className="btn-action" onClick={handleLogin}>ENTRAR</button>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    <div style={{ position: 'relative' }}>
                        <div className="wp-logo">WAVEPOD</div>
                        <button onClick={handleLogout} style={{ position: 'absolute', right: 0, top: 25, background: 'none', border: 'none', color: 'red', fontWeight: 'bold' }}>Sair</button>
                    </div>

                    {tab === 'home' && (
                        <div className="main-balance">
                            <div className="label-sub">Saldo Disponível (Lucro)</div>
                            <div className="val-hero">R$ 0,00</div>
                            <div style={{ display: 'flex', justifyContent: 'center', gap: '30px', marginTop: 15 }}>
                                <div><small className="label-sub">Diego (50%)</small><br/>R$ 0,00</div>
                                <div><small className="label-sub">Lucas (50%)</small><br/>R$ 0,00</div>
                            </div>
                        </div>
                    )}

                    {tab === 'vendas' && (
                        <div className="card">
                            <h2>Registrar Venda</h2>
                            <p style={{color: 'var(--sub)'}}>Selecione o pod do estoque e defina o valor.</p>
                            <button className="btn-action" onClick={() => alert('Em breve conectado ao DB')}>Confirmar</button>
                        </div>
                    )}

                    <div className="tab-bar">
                        <button className={`tab-item ${tab==='home'?'active':''}`} onClick={()=>setTab('home')}><span>📊</span>Dashboard</button>
                        <button className={`tab-item ${tab==='vendas'?'active':''}`} onClick={()=>setTab('vendas')}><span>💰</span>Vendas</button>
                        <button className={`tab-item ${tab==='compras'?'active':''}`} onClick={()=>setTab('compras')}><span>📦</span>Compras</button>
                        <button className={`tab-item ${tab==='history'?'active':''}`} onClick={()=>setTab('history')}><span>🕒</span>Histórico</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
